name: Build Multi-Arch Docker Image

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-amd64:
    name: Build & Push AMD64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Set release date
        run: |
          echo "RELEASE_DATE=$(date +%Y.%m.%d)" >> ${GITHUB_ENV}
          echo "CACHE_DATE=$(date +%s)" >> ${GITHUB_ENV}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (AMD64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_DATE }}-amd64
          build-args: |
            CACHEBUST=${{ env.CACHE_DATE }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    name: Build & Push ARM64
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Set release date
        run: |
          echo "RELEASE_DATE=$(date +%Y.%m.%d)" >> ${GITHUB_ENV}
          echo "CACHE_DATE=$(date +%s)" >> ${GITHUB_ENV}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (ARM64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_DATE }}-arm64
          build-args: |
            CACHEBUST=${{ env.CACHE_DATE }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Set release date
        run: echo "RELEASE_DATE=$(date +%Y.%m.%d)" >> ${GITHUB_ENV}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Manifest List
        run: |
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-amd64             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-arm64
          
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_DATE }}             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_DATE }}-amd64             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_DATE }}-arm64

      - name: Verify Manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
